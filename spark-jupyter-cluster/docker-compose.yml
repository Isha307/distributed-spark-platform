services:

  spark-master:
    image: apache/spark:3.5.1 # Download prebuilt Spark machine
    user: root

    container_name: spark-master # "This container is the cluster manager"

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    
    environment:
      - SPARK_MODE=master

    ports:
      - "8085:8080"  # Spark Web UI
      - "7079:7077"  # Spark cluster connection
    
    volumes:
      - ./input:/input
      - spark-data:/data

  spark-worker-1:
    image: apache/spark:3.5.1
    user: root

    container_name: spark-worker-1

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

    ports:
      - "8081:8081"  # Spark Worker Web UI

    depends_on:
      - spark-master

    volumes:
      - ./input:/input
      - spark-data:/data

  spark-worker-2:
    image: apache/spark:3.5.1
    user: root

    container_name: spark-worker-2

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
  
    ports:
      - "8082:8081"  # Spark Worker Web UI

    depends_on:
      - spark-master

    volumes:
      - ./input:/input
      - spark-data:/data

  jupyter:
    build: ./jupyter-image
    user: root

    container_name: jupyter

    ports:
      - "8888:8888"
      - "4040:4040"  # Spark application UI

    depends_on:
      - spark-master

    volumes:
      - ./input:/input
      - spark-data:/data

  minio:
    image: minio/minio

    container_name: minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI

    volumes:
      - minio-data:/data

  
volumes:
  spark-data:
  minio-data: